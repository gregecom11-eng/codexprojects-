<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bianca Dispatch CRM</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f6f7fb;color:#111}
    header{background:#111827;color:#fff;padding:12px 16px}
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    .grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px}
    input,select,textarea,button{padding:8px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px}
    button{cursor:pointer;background:#111827;color:white;border:none}
    .btn-secondary{background:#374151}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left;vertical-align:top}
    .row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    @media(max-width:900px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><strong>Bianca Dispatch CRM — Multi-Device MVP</strong></header>
<div class="wrap grid">
  <section class="card">
    <h3>Sync Setup (Supabase - optional)</h3>
    <div class="row">
      <input id="sbUrl" placeholder="Supabase URL" />
      <input id="sbAnonKey" placeholder="Supabase anon key" />
      <input id="sbEmail" placeholder="Email (for magic link login)" />
    </div>
    <p>
      <button id="connect">Connect Sync</button>
      <button id="login" class="btn-secondary">Send Magic Link</button>
      <button id="logout" class="btn-secondary">Logout</button>
      <span id="syncState"></span>
    </p>
  </section>

  <section class="grid kpis">
    <div class="card"><div>Trips (filtered)</div><h2 id="kTrips">0</h2></div>
    <div class="card"><div>Revenue</div><h2 id="kRevenue">$0.00</h2></div>
    <div class="card"><div>Cost</div><h2 id="kCost">$0.00</h2></div>
    <div class="card"><div>Profit</div><h2 id="kProfit">$0.00</h2></div>
  </section>

  <section class="card">
    <h3>Add / Edit Trip</h3>
    <input type="hidden" id="editId" />
    <div class="row">
      <input id="pickupAt" type="datetime-local" />
      <input id="affiliateTripId" placeholder="Affiliate Trip ID (e.g., WA123)" />
      <input id="partner" placeholder="Source Partner (Cary, etc.)" />
      <input id="passenger" placeholder="Passenger Name" />
      <input id="phone" placeholder="Passenger Phone" />
      <select id="vehicleClass"><option>SUV</option><option>Sedan</option><option>Sprinter</option></select>
      <select id="jobType"><option value="point_to_point">Point-to-Point</option><option value="city_to_city">City-to-City</option><option value="hourly">Hourly</option></select>
      <input id="pickup" placeholder="Pickup Address" />
      <input id="dropoff" placeholder="Dropoff Address" />
      <input id="driver" placeholder="Assigned Driver" />
      <select id="status"><option>new</option><option>assigned</option><option>en_route</option><option>on_trip</option><option>completed</option><option>cancelled</option><option>no_show</option></select>
      <input id="revenue" type="number" step="0.01" placeholder="Revenue" />
      <input id="cost" type="number" step="0.01" placeholder="Cost" />
    </div>
    <p><button id="save">Save Trip</button><button id="resetForm" class="btn-secondary" type="button">Reset</button></p>
  </section>

  <section class="card"><h3>Paste Affiliate Details</h3><textarea id="raw" rows="6" style="width:100%"></textarea><p><button id="parse">Parse Into Form</button></p></section>
  <section class="card"><h3>Filters & Export</h3><div class="row"><input id="search" placeholder="Search passenger/route/driver" /><select id="fStatus"><option value="">All statuses</option><option>new</option><option>assigned</option><option>en_route</option><option>on_trip</option><option>completed</option><option>cancelled</option><option>no_show</option></select><input id="fPartner" placeholder="Filter by partner" /></div><p><label><input id="todayOnly" type="checkbox" /> Today only</label> <button id="exportCsv" class="btn-secondary" type="button">Export CSV</button></p></section>

  <section class="card"><h3>Trips</h3><table><thead><tr><th>PU Time</th><th>Passenger</th><th>Route</th><th>Driver</th><th>Status</th><th>Partner</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></section>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
